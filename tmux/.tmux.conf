set -gu prefix2
# replace C-b by C-f instead of using both prefixes
unbind C-a
unbind C-b
set -g prefix C-f
bind C-f send-prefix
bind f send-prefix

# Terminal
set -g default-terminal 'tmux-256color'
set -g default-shell /bin/zsh

# Outer terminal capabilities (Ghostty, Windows Terminal, SSH)
set -as terminal-features 'xterm-ghostty:RGB:mouse'
set -as terminal-features 'xterm-256color:RGB:mouse'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours
set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'  # OSC 52 clipboard

# vim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded."

set -g set-titles on
setw -g automatic-rename on

# Use 1-based index
setw -g pane-base-index 1
set -g base-index 1
set -g renumber-windows on

set -g history-limit 10000
set -s escape-time 50

# vim-like pane switching
bind -r ` last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind > swap-pane -D 
bind < swap-pane -U

# resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# split new panes with current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# start with mouse mode enabled
set -g mouse on

# enable focus support
set -g focus-events on

# OSC 52 clipboard (works across Ghostty, Windows Terminal, SSH)
set -s set-clipboard on
set -g allow-passthrough on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Voice-to-text toggle (Mac-side, works even in nested/off mode)
bind -T root F9 run-shell -b "~/dev/lifesupport/bin/voice-toggle #{pane_id}"
bind -T off  F9 run-shell -b "~/dev/lifesupport/bin/voice-toggle #{pane_id}"
bind -T root S-F9 run-shell -b "~/dev/lifesupport/bin/voice-toggle --toggle-mode"
bind -T off  S-F9 run-shell -b "~/dev/lifesupport/bin/voice-toggle --toggle-mode"

# Disable tmux with F12 for nested session
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-left "#[fg=colour232,bg=colour245,bold] #S \
#[fg=colour245,bg=colour240,nobold]#[fg=colour233,bg=colour240] \
#(whoami) #[fg=colour240,bg=colour235]#[fg=colour240,bg=colour235] \
#I:#P #[fg=colour235,bg=colour233,nobold]" \;\
  refresh-client -S
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-left \;\
  refresh-client -S

# styling
# reference https://github.com/gpakosz/.tmux/blob/master/.tmux.conf

#!/usr/bin/env bash
# Nightfox colors for Tmux
# Style: nightfox
# Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/nightfox/nightfox.tmux
set -g mode-style "fg=#131a24,bg=#aeafb0"
set -g message-style "fg=#131a24,bg=#aeafb0"
set -g message-command-style "fg=#131a24,bg=#aeafb0"
set -g pane-border-style "fg=#aeafb0"
set -g pane-active-border-style "fg=#719cd6"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#aeafb0,bg=#131a24"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#131a24,bg=#719cd6,bold] #S #[fg=#719cd6,bg=#131a24,nobold,nounderscore,noitalics]"
set -g status-right "#(~/dev/lifesupport/bin/voice-status state) #(~/dev/lifesupport/bin/voice-status mode) #[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]#[fg=#719cd6,bg=#131a24] #{prefix_highlight} #[fg=#aeafb0,bg=#131a24,nobold,nounderscore,noitalics]#[fg=#131a24,bg=#aeafb0] %Y-%m-%d  %I:%M %p #[fg=#719cd6,bg=#aeafb0,nobold,nounderscore,noitalics]#[fg=#131a24,bg=#719cd6,bold] #h "
setw -g window-status-activity-style "underscore,fg=#71839b,bg=#131a24"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#71839b,bg=#131a24"
setw -g window-status-format "#[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#131a24,bg=#aeafb0,nobold,nounderscore,noitalics]#[fg=#131a24,bg=#aeafb0,bold] #I  #W #F #[fg=#aeafb0,bg=#131a24,nobold,nounderscore,noitalics]"
